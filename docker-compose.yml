# Docker Compose configuration for BOB Camera - Local Build
# This file builds both backend (bob-ros2) and frontend (web-react) from source
version: '3.8'

services:
  # Backend service - ROS2-based bob service built from source
  bob:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: bob-ros2-prod
    image: bobcamera/bob-ros2-prod:local-build
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    environment:
      - BOB_LOGLEVEL=${BOB_LOGLEVEL:-INFO}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./docker/assets:/workspaces/bobcamera/src/ros2/assets
      - ./docker/assets/config/app_config.yaml:/workspaces/bobcamera/src/ros2/assets/config/app_config.yaml
    networks:
      - bob-network

  # Web UI service - React frontend built from source
  web:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: bobcamera/bob-web-react:local-build
    ports:
      - "8080:80"
    depends_on:
      - bob
    environment:
      - BOB_LOGLEVEL=${BOB_LOGLEVEL:-INFO}
    volumes:
      - ./docker/assets/recordings:/usr/share/nginx/html/videos
    networks:
      - bob-network

networks:
  bob-network:
    driver: bridge

volumes:
  bob-data: